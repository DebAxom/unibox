services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: joiaiaxom
      POSTGRES_DB: unibox
    volumes:
      - ./volume/postgres:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d # Auto Run Scripts
    ports:
      - "5001:5432"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./volume/redis:/data
    ports:
      - "5002:6379"

volumes:
  postgres:
  redis: